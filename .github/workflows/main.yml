name: Build Zen Browser Portable

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:      # Manual trigger button

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and Download Zip
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $url = "https://api.github.com/repos/zen-browser/desktop/releases/tags/twilight-1"
          $headers = @{ "Authorization" = "token $env:GH_TOKEN" }
          
          try {
              $release = Invoke-RestMethod -Uri $url -Method Get -Headers $headers
          } catch {
              Write-Error "API Error: $($_.Exception.Message)"
              exit 1
          }

          $downloadUrl = ""
          $displayName = $release.name

          foreach ($asset in $release.assets) {
              if ($asset.name -eq "zen.win-x86_64.zip") {
                  $downloadUrl = $asset.browser_download_url
                  break
              }
          }

          if (-not $downloadUrl) {
              Write-Error "Target Not Found - checked for zen.win-x86_64.zip"
              exit 1
          }

          Invoke-WebRequest -Uri $downloadUrl -OutFile "zen.zip"
          echo "DISPLAY_VERSION=$displayName" >> $env:GITHUB_ENV

      - name: Extract and Build
        shell: powershell
        run: |
          # Setup folder structure
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\App"
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\Data\Profile1"
          
          # Extract and locate zen.exe
          Expand-Archive -Path "zen.zip" -DestinationPath "temp_extract" -Force
          $zenRoot = Get-ChildItem -Path "temp_extract" -Recurse -File -Filter "zen.exe" | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          
          # Move browser files to App folder
          Copy-Item -Path "$zenRoot\*" -Destination "ZenBrowserPortable\App" -Recurse -Force
          Remove-Item -Path "temp_extract" -Recurse -Force

      - name: Configure and Package
        shell: powershell
        run: |
          # 1. Disable updates to keep it portable
          $distDir = "ZenBrowserPortable\App\distribution"
          New-Item -ItemType Directory -Force -Path $distDir
          Set-Content -Path "$distDir\policies.json" -Value '{ "policies": { "DisableAppUpdate": true, "ManualAppUpdateOnly": true } }'
          
          # 2. CREATE THE .BAT LAUNCHER (Automatically included in ZIP)
          $batContent = @"
          @echo off
          set "BASE_DIR=%~dp0"
          set "APP_DIR=%BASE_DIR%App"
          set "DATA_DIR=%BASE_DIR%Data\Profile1"
          if exist "%APP_DIR%\zen.exe" (
              start "" /d "%APP_DIR%" "zen.exe" -profile "%DATA_DIR%" -no-remote
              exit
          ) else (
              echo Error: zen.exe not found in %APP_DIR%
              pause
          )
          "@
          Set-Content -Path "ZenBrowserPortable\Zen-Portable-Windows.bat" -Value $batContent
          
          # 3. Create ZIP with timestamp
          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $zipName = "ZenBrowserPortable_Twilight_$timestamp.zip"
          Compress-Archive -Path "ZenBrowserPortable" -DestinationPath $zipName -Force
          
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "TIMESTAMP=$timestamp" >> $env:GITHUB_ENV

      - name: Create Unique Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$($env:TIMESTAMP)"
          gh release create $tag --title "Zen Twilight ($($env:DISPLAY_VERSION)) - $($env:TIMESTAMP)" --notes "Automated build. Includes Zen-Portable-Windows.bat launcher." "$($env:ZIP_NAME)"
