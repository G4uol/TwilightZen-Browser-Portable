name: Build Zen Browser Portable

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for New Version
        id: check_version
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $url = "https://api.github.com/repos/zen-browser/desktop/releases/tags/twilight-1"
          $release = Invoke-RestMethod -Uri $url -Method Get
          
          $asset = $release.assets | Where-Object { $_.name -eq "zen.win-x86_64.zip" }
          $currentHash = $asset.updated_at
          
          # Try to get the hash from the last run
          $lastHash = ""
          if (Test-Path "last_build_hash.txt") { $lastHash = Get-Content "last_build_hash.txt" }

          if ($currentHash -eq $lastHash) {
              Write-Host "No new version detected since last build ($currentHash). Skipping..."
              echo "SKIP_BUILD=true" >> $env:GITHUB_ENV
          } else {
              echo "SKIP_BUILD=false" >> $env:GITHUB_ENV
              echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
              echo "ASSET_HASH=$currentHash" >> $env:GITHUB_ENV
              # Use a cleaner display name
              echo "DISPLAY_VERSION=Twilight-1" >> $env:GITHUB_ENV
          }

      - name: Download and Build
        if: env.SKIP_BUILD != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri $env:DOWNLOAD_URL -OutFile "zen.zip"
          
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\App"
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\Data\Profile1"
          
          Expand-Archive -Path "zen.zip" -DestinationPath "temp_extract" -Force
          $zenRoot = Get-ChildItem -Path "temp_extract" -Recurse -File -Filter "zen.exe" | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          Copy-Item -Path "$zenRoot\*" -Destination "ZenBrowserPortable\App" -Recurse -Force
          
          # Add the policy file
          $distDir = "ZenBrowserPortable\App\distribution"
          New-Item -ItemType Directory -Force -Path $distDir
          Set-Content -Path "$distDir\policies.json" -Value '{ "policies": { "DisableAppUpdate": true, "ManualAppUpdateOnly": true } }'
          
          # Create Launcher
          $batContent = "@echo off`nset `"BASE_DIR=%~dp0`"`ncd /d `"%BASE_DIR%`"`nset `"APP_DIR=%BASE_DIR%App`"`nset `"DATA_DIR=%BASE_DIR%Data\Profile1`"`nif exist `"%APP_DIR%\updater.exe`" ren `"%APP_DIR%\updater.exe`" `"updater.exe.stop`"`nstart `"`" /d `"%APP_DIR%`" `"zen.exe`" -profile `"%DATA_DIR%`" -no-remote`nexit"
          Set-Content -Path "ZenBrowserPortable\Zen-Portable-Windows.bat" -Value $batContent

          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $zipName = "ZenBrowserPortable_Twilight_$timestamp.zip"
          Compress-Archive -Path "ZenBrowserPortable" -DestinationPath $zipName -Force
          
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "TIMESTAMP=$timestamp" >> $env:GITHUB_ENV
          
          # Save the hash so we don't build this same version tomorrow
          $env:ASSET_HASH | Out-File "last_build_hash.txt"

      - name: Update Hash in Repo
        if: env.SKIP_BUILD != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_build_hash.txt
          git commit -m "Update build hash [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Unique Release
        if: env.SKIP_BUILD != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$($env:TIMESTAMP)"
          gh release create $tag --title "Zen Twilight ($($env:DISPLAY_VERSION)) - $($env:TIMESTAMP)" --notes "Automated portable build. Up-to-date as of $($env:ASSET_HASH)" "$($env:ZIP_NAME)"
