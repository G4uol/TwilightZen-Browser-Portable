name: Build Zen Browser Portable

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for New Version
        id: check_version
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the actual Code Commit SHA for the twilight-1 tag
          $commitUrl = "https://api.github.com/repos/zen-browser/desktop/commits/twilight-1"
          $commitData = Invoke-RestMethod -Uri $commitUrl -Method Get
          $commitSha = $commitData.sha

          # 2. Get the Release Asset
          $url = "https://api.github.com/repos/zen-browser/desktop/releases/tags/twilight-1"
          $release = Invoke-RestMethod -Uri $url -Method Get
          
          $asset = $release.assets | Where-Object { $_.name -like "zen.win-x86_64.zip" } | Select-Object -First 1
          if ($null -eq $asset) {
              $asset = $release.assets | Where-Object { $_.name -like "zen*.win-x86_64.zip" } | Select-Object -First 1
          }

          if ($null -eq $asset) {
              Write-Error "CRITICAL: Could not find the Windows engine zip."
              exit 1
          }

          # THE ULTIMATE FINGERPRINT: Code Commit SHA + Asset ID
          $currentHash = "COMMIT_$($commitSha)_ASSET_$($asset.id)"
          
          $lastHash = ""
          if (Test-Path "last_build_hash.txt") { $lastHash = Get-Content "last_build_hash.txt" }

          Write-Host "Current Fingerprint: $currentHash"
          Write-Host "Last Build: $lastHash"

          if ($currentHash -eq $lastHash) {
              Write-Host "Match found. No new code committed. Skipping..."
              echo "SKIP_BUILD=true" >> $env:GITHUB_ENV
          } else {
              Write-Host "NEW CODE DETECTED! Proceeding to build..."
              echo "SKIP_BUILD=false" >> $env:GITHUB_ENV
              echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
              echo "ASSET_HASH=$currentHash" >> $env:GITHUB_ENV
          }

      - name: Download and Build
        if: env.SKIP_BUILD != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri $env:DOWNLOAD_URL -OutFile "zen.zip"
          
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\App"
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\Data\Profile1"
          
          Expand-Archive -Path "zen.zip" -DestinationPath "temp_extract" -Force
          
          $zenRoot = Get-ChildItem -Path "temp_extract" -Recurse -File -Filter "zen.exe" | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          Copy-Item -Path "$zenRoot\*" -Destination "ZenBrowserPortable\App" -Recurse -Force
          
          $batContent = "@echo off`nset `"BASE_DIR=%~dp0`"`ncd /d `"%BASE_DIR%`"`nset `"APP_DIR=%BASE_DIR%App`"`nset `"DATA_DIR=%BASE_DIR%Data\Profile1`"`nif exist `"%APP_DIR%\zen.exe`" (`n    start `"`" /d `"%APP_DIR%`" `"zen.exe`" -profile `"%DATA_DIR%`" -no-remote`n    exit`n) else (`n    echo Error: zen.exe not found.`n    pause`n)"
          Set-Content -Path "ZenBrowserPortable\Zen-Portable-Windows.bat" -Value $batContent

          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $zipName = "ZenBrowserPortable_Twilight_$timestamp.zip"
          Compress-Archive -Path "ZenBrowserPortable" -DestinationPath $zipName -Force
          
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV,
          echo "TIMESTAMP=$timestamp" >> $env:GITHUB_ENV
          $env:ASSET_HASH | Out-File "last_build_hash.txt"

      - name: Update Hash in Repo
        if: env.SKIP_BUILD != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_build_hash.txt
          git commit -m "Update build hash [skip ci]" || echo "No changes"
          git push

      - name: Create Release
        if: env.SKIP_BUILD != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$($env:TIMESTAMP)"
          gh release create $tag --title "Zen Twilight ($($env:TIMESTAMP))" --notes "Automated build for Twilight-1. Fingerprint: $($env:ASSET_HASH)" "$($env:ZIP_NAME)"
