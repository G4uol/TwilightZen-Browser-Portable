name: Build Zen Browser Portable

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:      # This enables the "Run workflow" button

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node deprecation warning
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and Download Zip
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the new twilight-1 tag
          $url = "https://api.github.com/repos/zen-browser/desktop/releases/tags/twilight-1"
          $headers = @{ "Authorization" = "token $env:GH_TOKEN" }
          
          try {
              $release = Invoke-RestMethod -Uri $url -Method Get -Headers $headers
          } catch {
              Write-Error "API Error: $($_.Exception.Message)"
              exit 1
          }

          $downloadUrl = ""
          $displayName = $release.name
          $assetUpdated = ""

          foreach ($asset in $release.assets) {
              if ($asset.name -eq "zen.win-x86_64.zip") {
                  $downloadUrl = $asset.browser_download_url
                  $assetUpdated = $asset.updated_at
                  break
              }
          }

          if (-not $downloadUrl) {
              Write-Error "Target Not Found - checked for zen.win-x86_64.zip"
              exit 1
          }

          Write-Host "Display name: $displayName | Updated: $assetUpdated"
          
          # Download the file
          Invoke-WebRequest -Uri $downloadUrl -OutFile "zen.zip"
          
          # Save variables for next steps
          echo "DISPLAY_VERSION=$displayName" >> $env:GITHUB_ENV
          echo "ASSET_UPDATED=$assetUpdated" >> $env:GITHUB_ENV

      - name: Extract and Build
        shell: powershell
        run: |
          # Create folder structure
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\App\ZenBrowser"
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\App\AppInfo"
          New-Item -ItemType Directory -Force -Path "ZenBrowserPortable\Data"
          
          # Extract
          Expand-Archive -Path "zen.zip" -DestinationPath "temp_extract" -Force
          $zenRoot = Get-ChildItem -Path "temp_extract" -Recurse -File -Filter "zen.exe" | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          
          Copy-Item -Path "$zenRoot\*" -Destination "ZenBrowserPortable\App\ZenBrowser" -Recurse -Force
          
          # Clean up temp
          Remove-Item -Path "temp_extract" -Recurse -Force

      - name: Configure and Package
        shell: powershell
        run: |
          # Disable updates in policies.json
          $distDir = "ZenBrowserPortable\App\ZenBrowser\distribution"
          New-Item -ItemType Directory -Force -Path $distDir
          Set-Content -Path "$distDir\policies.json" -Value '{ "policies": { "DisableAppUpdate": true, "ManualAppUpdateOnly": true } }'
          
          # Create ZIP
          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $zipName = "ZenBrowserPortable_Twilight_latest_$timestamp.zip"
          Compress-Archive -Path "ZenBrowserPortable" -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "twilight-$(Get-Date -Format 'yyyyMMdd-HHmm')"
          gh release create $tag --title "Zen Twilight Portable ($($env:DISPLAY_VERSION))" --notes "Automated build of Zen Browser Twilight-1." "$($env:ZIP_NAME)"
